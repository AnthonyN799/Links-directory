<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Therapeutic Oils — Links Directory</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #1a1f36;
    --navy-light: #2d3352;
    --bg: #fafbfd;
    --text: #1a1f36;
    --text-muted: #7c8298;
    --accent: #1a1f36;
    --accent-soft: #eef0f6;
    --card-bg: #ffffff;
    --card-border: #e6e8f0;
    --shadow: 0 1px 3px rgba(26,31,54,0.04), 0 4px 14px rgba(26,31,54,0.04);
    --shadow-hover: 0 4px 12px rgba(26,31,54,0.08), 0 12px 28px rgba(26,31,54,0.06);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 60px 24px 80px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    right: -30%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(26,31,54,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 44px;
    animation: fadeUp 0.8s ease both;
  }

  .logo-img {
    height: 56px;
    margin-bottom: 20px;
    object-fit: contain;
  }

  .header h1 {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Divider */
  .divider {
    width: 40px;
    height: 2px;
    background: var(--navy);
    margin: 0 auto 36px;
    border-radius: 1px;
    animation: fadeUp 0.8s ease 0.1s both;
  }

  /* Links */
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    text-decoration: none;
    color: var(--text);
    box-shadow: var(--shadow);
    transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    overflow: hidden;
  }

  .link-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(26,31,54,0.02), transparent);
    opacity: 0;
    transition: opacity 0.35s ease;
  }

  .link-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-3px);
    border-color: rgba(26,31,54,0.15);
  }

  .link-card:hover::before {
    opacity: 1;
  }

  .link-card:hover .link-arrow {
    transform: translateX(3px);
    opacity: 1;
  }

  .link-card:hover .link-icon {
    background: var(--navy);
  }

  .link-card:hover .link-icon svg {
    stroke: #fff;
  }

  .link-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.35s ease;
  }

  .link-icon svg {
    width: 20px;
    height: 20px;
    stroke: var(--navy);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.35s ease;
  }

  .link-text {
    flex: 1;
    min-width: 0;
    position: relative;
    z-index: 1;
  }

  .link-text h3 {
    font-weight: 600;
    font-size: 15.5px;
    margin-bottom: 1px;
    letter-spacing: 0.01em;
  }

  .link-text span {
    font-size: 12.5px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .link-arrow {
    flex-shrink: 0;
    opacity: 0.25;
    transition: all 0.35s ease;
    position: relative;
    z-index: 1;
  }

  .link-arrow svg {
    width: 16px;
    height: 16px;
    stroke: var(--navy);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* stagger */
  .link-card:nth-child(1) { animation: fadeUp 0.55s ease 0.12s both; }
  .link-card:nth-child(2) { animation: fadeUp 0.55s ease 0.22s both; }
  .link-card:nth-child(3) { animation: fadeUp 0.55s ease 0.32s both; }
  .link-card:nth-child(4) { animation: fadeUp 0.55s ease 0.42s both; }
  .link-card:nth-child(5) { animation: fadeUp 0.55s ease 0.52s both; }
  .link-card:nth-child(6) { animation: fadeUp 0.55s ease 0.62s both; }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 44px;
    animation: fadeUp 0.55s ease 0.72s both;
  }

  .footer p {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .footer .leaf {
    display: inline-block;
    margin: 0 6px;
    opacity: 0.4;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    body { padding: 36px 16px 56px; }
    .link-card { padding: 16px 18px; gap: 14px; }
    .link-icon { width: 40px; height: 40px; }
  }
</style>
</head>
